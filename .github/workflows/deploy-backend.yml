name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'requirements*.txt'
      - 'alembic/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push to ECR
        run: |
          docker build -t 035741228337.dkr.ecr.ap-southeast-2.amazonaws.com/robot-backend:latest .
          docker push 035741228337.dkr.ecr.ap-southeast-2.amazonaws.com/robot-backend:latest

      - name: Deploy to App Runner
        run: |
          aws apprunner start-deployment \
            --service-arn arn:aws:apprunner:ap-southeast-2:035741228337:service/robot-backend-app/bbdf9492c9114e0eb71d1b714df9e3e7 \
            --region ap-southeast-2
