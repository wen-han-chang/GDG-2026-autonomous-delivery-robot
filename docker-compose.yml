services:
  # 1. 資料庫服務
  db:
    image: postgres:15-alpine
    container_name: robot-db
    restart: always
    environment:
      - POSTGRES_USER=robot_user
      - POSTGRES_PASSWORD=robot_pass
      - POSTGRES_DB=robot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  # 2. MQTT Broker (Mosquitto)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: robot-mqtt
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  # 3. 後端服務 (Python)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robot-backend
    restart: always
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://robot_user:robot_pass@db:5432/robot_db
    depends_on:
      - db
      - mosquitto

  # 3. 前端服務 (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${FRONTEND_VITE_API_URL:-https://gdg-2026-autonomous-delivery-robot.duckdns.org}
    container_name: robot-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

# 4. 定義磁碟區
volumes:
  postgres_data: