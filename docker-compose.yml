services:
  # 1. 資料庫服務
  db:
    image: postgres:15-alpine
    container_name: robot-db
    restart: always
    environment:
      - POSTGRES_USER=robot_user
      - POSTGRES_PASSWORD=robot_pass
      - POSTGRES_DB=robot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  # 2. 後端服務 (這裡是修正重點)
  backend:
    build: .
    container_name: robot-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db            # 👈 保留：確保資料庫先啟動
    env_file:         # 👈 新增：這是同學加的，用來讀取 .env 裡的 JWT 金鑰
      - .env
    environment:
      - DATABASE_URL=postgresql://robot_user:robot_pass@db:5432/robot_db

  # 3. 前端服務
  frontend:
    build: ./frontend
    container_name: robot-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_API_TARGET=http://backend:8000

# 4. 定義磁碟區
volumes:
  postgres_data: