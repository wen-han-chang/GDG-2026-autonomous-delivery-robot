# Docker nginx：SSL termination + 反向代理至 backend，前端走相對路徑同源
# HTTP：一律導向 HTTPS
server {
    listen 80;
    server_name gdg-2026-autonomous-delivery-robot.duckdns.org;
    return 301 https://$host$request_uri;
}

# HTTPS：SSL termination + 反向代理
server {
    listen 443 ssl;
    server_name gdg-2026-autonomous-delivery-robot.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/gdg-2026-autonomous-delivery-robot.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gdg-2026-autonomous-delivery-robot.duckdns.org/privkey.pem;

    # WebSocket proxy to backend
    location /ws {
        proxy_pass http://robot-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API proxy to backend
    location ~ ^/(orders|auth|users|stores|products|planner) {
        proxy_pass http://robot-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
